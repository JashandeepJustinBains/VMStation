server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /var/promtail/positions.yaml

clients:
  - url: http://192.168.4.63:3100/loki/api/v1/push

scrape_configs:
  - job_name: system
    static_configs:
      - targets: ['localhost']
        labels:
          job: varlogs
          __path__: /var/log/*log
  - job_name: system_nested
    static_configs:
      - targets: ['localhost']
        labels:
          job: varlogs_nested
          __path__: /var/log/*/*log
  - job_name: podman_logs
    static_configs:
      - targets: ['localhost']
        labels:
          job: podman
          __path__: /var/lib/containers/storage/overlay-containers/*/userdata/ctr.log